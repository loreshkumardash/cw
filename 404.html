<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>404 - Page Not Found | Cakiweb Solutions</title>
  <meta name="description" content="The page you are looking for has been moved or does not exist. Redirecting you to the homepage.">
  <meta name="robots" content="noindex, follow">

  <!-- Google Search Console Verification -->
  <meta name="google-site-verification" content="NVQ8VUECqhF3XYz15id19tYpaABOXvP_F9epPa-SLx4" />

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-0WVN27L5EV"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-0WVN27L5EV');
  </script>

  <link href="assets/img/newlogo.png" rel="icon">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">

  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
    }

    .error-container {
      text-align: center;
      padding: 50px 40px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 600px;
      width: 100%;
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .error-code {
      font-size: 120px;
      font-weight: 800;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0;
      line-height: 1;
    }

    .error-title {
      font-size: 28px;
      font-weight: 700;
      color: #333;
      margin: 20px 0 10px;
    }

    .error-message {
      font-size: 16px;
      color: #666;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 40px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-decoration: none;
      border-radius: 50px;
      font-weight: 600;
      font-size: 16px;
      transition: all 0.3s ease;
      border: none;
      cursor: pointer;
    }

    .btn-home:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
      color: white;
      text-decoration: none;
    }

    .redirect-text {
      font-size: 14px;
      color: #999;
      margin-top: 25px;
    }

    .countdown {
      font-weight: 700;
      color: #667eea;
      font-size: 18px;
    }

    .logo {
      max-width: 120px;
      margin-bottom: 30px;
    }
  </style>
</head>

<body>
  <div class="error-container">
    <img src="assets/img/newlogo.png" alt="Cakiweb Solutions" class="logo">
    
    <h1 class="error-code">404</h1>
    <h2 class="error-title">Oops! Page Not Found</h2>
    <p class="error-message">
      The page you're looking for doesn't exist or has been moved. 
      Don't worry, we'll get you back on track!
    </p>
    
    <a href="https://cakiweb.com/" class="btn-home">
      <i class="bi bi-house-door-fill"></i>
      Go to Homepage
    </a>
    
    <p class="redirect-text">
      Redirecting to homepage in <span class="countdown" id="countdown">5</span> seconds...
    </p>
  </div>

  <script>
    // Countdown timer before redirect
    let seconds = 5;
    const countdownElement = document.getElementById('countdown');
    
    const timer = setInterval(function() {
      seconds--;
      countdownElement.textContent = seconds;
      
      if (seconds <= 0) {
        clearInterval(timer);
        window.location.href = 'https://cakiweb.com/';
      }
    }, 1000);

    // Track 404 error in Google Analytics
    if (typeof gtag !== 'undefined') {
      gtag('event', '404_error', {
        'event_category': 'Error',
        'event_label': document.referrer || 'Direct',
        'page_path': window.location.pathname
      });
    }
  </script>

  <script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>

</html>
